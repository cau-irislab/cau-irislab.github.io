---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    <p class="post-meta">
      • Authors: {{ page.authors }}<br>
      • Published in: {{ page.venue }}<br>      
      {% if page.pdf %}<a href="{{ page.pdf }}" target="_blank" rel="noopener noreferrer">[PDF]</a>&nbsp;{% endif %}
      {% if page.project %}<a href="{{ page.project }}" target="_blank" rel="noopener noreferrer">[Project]</a>&nbsp;{% endif %}
      {% if page.code %}<a href="{{ page.code }}" target="_blank" rel="noopener noreferrer">[Code]</a>{% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
  
</article>
